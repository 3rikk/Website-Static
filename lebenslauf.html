	<!doctype html>
	<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>lebenslauf</title>

		<!-- Google Fonts (same link used on index.html) -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

		<style>
			:root{ --bg: #0E1411; --text: #D0C8B8; }
			html,body{ height:100%; margin:0; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

			.container{
				min-height:100vh;
				display:flex;
				flex-direction:column;
				align-items:center;
				justify-content:flex-start;
				padding:5rem 2rem;
				position:relative; /* allow absolute-positioned top-right text */
				box-sizing:border-box;
			}

			h1{ font-family:'Playfair Display',serif; font-weight:700; font-size:36pt; margin:0 0 2rem 0; text-transform:none; }

			/* PDF viewer container: approx 900pt wide, centered, subtle drop shadow (no visible border) */
			.pdf-frame{
				/* 75% of previous size: 900pt -> 675pt, 1200pt -> 900pt */
				width:675pt;
				max-width:100%; /* responsive on small screens */
				height:900pt; /* visible viewport height for the embedded PDF */
				/* remove any explicit background/border so the PDF appears flush */
				background:transparent;
				border:0;
				overflow:hidden;
				border-radius:6px;
				/* subtle dark drop shadow onto the page background */
				box-shadow: 0 8px 24px rgba(0,0,0,0.45);
			}

			/* Top-right small 'Back to Home' text: same style as body but half the size */
			.top-right{
				position:absolute;
				top:1.5rem;
				right:2rem;
				font-family:'Libre Baskerville', serif;
				font-size:15pt; /* half of 30pt body */
				color:var(--text);
				text-decoration:none;
			}

			@media (max-width:600px){
				.top-right{ display:none; }
			}

			.pdf-frame iframe{
				width:100%;
				height:100%;
				border:0;
				display:block;
			}

			.note{ font-family:'Libre Baskerville', serif; margin-top:1rem; font-size:12pt; color:var(--text); opacity:0.9 }
		</style>
	</head>
	<body>
		<main class="container">
			<a class="top-right" href="index.html">Back to Home</a>
			<h1>Lebenslauf</h1>
			<!-- Embed the PDF named 'lebenslauf.pdf' in the same folder. -->
			<div class="pdf-frame" role="region" aria-label="Lebenslauf PDF">
				<iframe src="lebenslauf.pdf">If your browser doesn't support embedding PDFs, download the file: <a href="lebenslauf.pdf" style="color:var(--text)">Download Lebenslauf</a></iframe>
			</div>
			<p class="note"><i>This PDF was last updated on the 8th December 2025</i></p>
		</main>
	</body>
	</html>
